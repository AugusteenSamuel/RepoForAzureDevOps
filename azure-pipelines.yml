trigger:
- main
 
pool:
  vmImage: 'windows-latest'
 
variables:
  buildConfiguration: 'Release'
 
stages:
 
# =============================
# 1. BUILD
# =============================
- stage: Build
  displayName: Build Application
 
  jobs:
  - job: BuildJob
 
    steps:
 
    - task: UseDotNet@2
      inputs:
        packageType: sdk
        version: '9.x'
 
    - task: DotNetCoreCLI@2
      displayName: Restore
      inputs:
        command: restore
        projects: '**/*.csproj'
 
    - task: DotNetCoreCLI@2
      displayName: Build
      inputs:
        command: build
        projects: '**/*.csproj'
        arguments: '--configuration Release'
    - task: DotNetCoreCLI@2
      inputs:
        command: 'test'
        projects: '**/*Tests.csproj'
        arguments: '--configuration Release'
 
    - task: DotNetCoreCLI@2
      displayName: Publish
      inputs:
        command: publish
        publishWebProjects: true
        arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)'
        zipAfterPublish: true
 
    - publish: $(Build.ArtifactStagingDirectory)
      artifact: drop
 
 
# =============================
# 2 DEPLOY TO QA
# =============================
- stage: DeployQA
 
  displayName: Deploy to QA
 
  dependsOn: Build
 
  jobs:
 
  - deployment: DeployQA
 
    environment: QA
 
    strategy:
      runOnce:
 
        deploy:
 
          steps:
 
          - download: current
            artifact: drop
 
          - task: AzureWebApp@1
 
            inputs:
 
              azureSubscription: 'aecsazuredevopslogicappsam'
              appType: 'webApp'
              appName: 'aecsazuredevopslogicappsam'
 
              deployToSlotOrASE: true
 
              resourceGroupName: 'rg_samazuredevops'
 
              slotName: 'staging-qa'
 
              package: '$(Pipeline.Workspace)/drop/**/*.zip'

 # 3 DEPLOY TO PRODUCTION
# =============================
- stage: Deploy_Prod
 
  displayName: Deploy to Production
 
  dependsOn: DeployQA
 
  jobs:
 
  - deployment: DeployProd
 
    environment: 'Production'
 
    strategy:
      runOnce:
 
        deploy:
 
          steps:
          - script: echo "Deploying to Production"
       

 

